<svg fill="none" viewBox="0 0 450 60" width="450" height="60" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml" style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; margin: 0; padding: 0;">
      <style>
        strong {
          font-family: "Comic Sans", "Comic Sans MS", Chalkboard, ChalkboardSE-Regular, "Marker Felt", Purisa, "URW Chancery L", cursive, sans-serif;
          color: limegreen;
          font-size: 1.5em;
          line-height: 1.2;
        }

        .blink {
          animation: blink-animation 1s steps(5, start) infinite;
        }

        @keyframes blink-animation {
          to {
            visibility: hidden;
          }
        }
      </style>
      <strong>
        My Name is Nihal and I like <span class="blink">Node.js</span>
      </strong>
    </div>
  </foreignObject>
</svg>
